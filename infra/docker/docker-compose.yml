version: "3.9"

# Local development stack for Project Warzone.
# Run from the infra/docker/ directory:
#   cp .env.example .env   (edit values)
#   docker compose up -d
#
# One Postgres database serves both Nakama's internal schema and our
# custom warzone_* tables — see docs/adr/ADR-0003 for why this is a
# single database rather than two.
#
# This is NOT the production topology. Horizontal scaling / k8s
# manifests are deferred to Phase 13+ (see infra/k8s/README.md).

services:
  postgres:
    image: postgres:16-alpine
    container_name: warzone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - warzone_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: warzone-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama-migrate:
    image: heroiclabs/nakama:3.21.1
    container_name: warzone-nakama-migrate
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ec"
      - "/nakama/nakama migrate up --database.address ${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"

  nakama:
    image: heroiclabs/nakama:3.21.1
    container_name: warzone-nakama
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nakama-migrate:
        condition: service_completed_successfully
    entrypoint:
      - "/bin/sh"
      - "-ec"
      - "/nakama/nakama --config /nakama/data/local.yml --database.address ${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
    volumes:
      - ./nakama/local.yml:/nakama/data/local.yml:ro
      - ../../server/modules:/nakama/data/modules:ro
    ports:
      - "${NAKAMA_HTTP_PORT}:7350"
      - "${NAKAMA_GRPC_PORT}:7349"
      - "${NAKAMA_CONSOLE_PORT}:7351"
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  warzone_postgres_data:
